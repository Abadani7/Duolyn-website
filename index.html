        function changeLanguage(lang) {
            const t = translations[lang];
            document.getElementById('form-lang-hidden').value = t.langKey;
            document.getElementById('nav-cta').innerText = t.navCta;
            document.getElementById('hero-tag').innerText = t.heroTag;
            document.getElementById('hero-title-1').innerText = t.heroTitle1;
            document.getElementById('hero-title-2').innerText = t.heroTitle2;
            document.getElementById('hero-title-3').innerText = t.heroTitle3;
            document.getElementById('hero-desc').innerText = t.heroDesc;
            document.getElementById('hero-btn-features').innerText = t.heroBtnFeatures;
            document.getElementById('hero-link').innerText = t.heroLink;
            document.getElementById('built-tag').innerText = t.builtTag;
            document.getElementById('features-title').innerText = t.featuresTitle;
            document.getElementById('about-title').innerText = t.aboutTitle;
            document.getElementById('about-p1').innerText = t.aboutP1;
            document.getElementById('about-quote').innerText = t.aboutQuote;
            document.getElementById('partner-title').firstChild.textContent = t.partnerTitle;
            document.getElementById('founding-tag').innerText = t.foundingTag;
            document.getElementById('founding-title').innerText = t.foundingTitle;
            document.getElementById('founding-desc').innerText = t.foundingDesc;
            document.getElementById('lbl-biz-name').innerText = t.lblBizName;
            document.getElementById('lbl-email').innerText = t.lblEmail;
            document.getElementById('lbl-phone').innerText = t.lblPhone;
            document.getElementById('lbl-country').innerText = t.lblCountry;
            document.getElementById('lbl-city').innerText = t.lblCity;
            document.getElementById('lbl-message').innerText = t.lblMessage;
            document.getElementById('gdpr-text').innerText = t.gdprText;
            document.getElementById('btn-submit').innerText = t.btnSubmit;
            document.getElementById('share-btn').innerText = t.shareBtn;
            document.getElementById('footer-privacy').innerText = t.footerPrivacy;
            document.getElementById('footer-terms').innerText = t.footerTerms;
            document.getElementById('footer-cookies').innerText = t.footerCookies;
            document.getElementById('privacy-box').innerHTML = t.msgPrivacy;
            document.getElementById('terms-box').innerHTML = t.msgTerms;
            document.getElementById('cookies-box').innerHTML = t.msgCookies;

            document.getElementById('vision-list').innerHTML = t.vision.map(word => `<li><span class="text-duo-gradient font-bold">${word[0]}</span>${word.slice(1)}</li>`).join('');
            document.getElementById('business-types').innerHTML = t.businessTypes.map(b => `<div>${b}</div>`).join('');
            document.getElementById('feature-grid').innerHTML = t.features.map(f => `<div class="glass-card p-8 rounded-3xl"><span class="feature-icon">${f.icon}</span><h4 class="text-white font-bold mb-3">${f.title}</h4><p class="text-stone-400 text-sm">${f.desc}</p></div>`).join('');
            document.getElementById('perks-list').innerHTML = t.perks.map(p => `<div class="flex gap-4"><span class="text-duo-gradient font-bold">✓</span><p class="text-[10px] text-stone-300 font-bold uppercase">${p}</p></div>`).join('');

            if(persistentCountry) {
                document.getElementById('partner-country-text').innerText = persistentCountry;
                document.getElementById('input-country').value = persistentCountry;
            }
            if(persistentCode && document.getElementById('ph-field').value === "") {
                 document.getElementById('ph-field').value = persistentCode + " ";
            }

            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');
        }

        document.getElementById('contact-form').onsubmit = function() {
            const currentLang = document.getElementById('form-lang-hidden').value.toLowerCase();
            const langCode = currentLang === "se" ? "sv" : currentLang;
            document.getElementById('btn-submit').innerText = translations[langCode].btnProcessing;
            document.getElementById('btn-submit').style.opacity = "0.7";
            document.getElementById('btn-submit').disabled = true;
        };

        async function initLocation() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                if(data.country_name) {
                    persistentCountry = data.country_name;
                    persistentCode = data.country_calling_code;
                    document.getElementById('partner-country-text').innerText = persistentCountry;
                    document.getElementById('input-country').value = persistentCountry;
                    document.getElementById('ph-field').value = persistentCode + " ";
                    renderPartners(persistentCountry);
                }
            } catch { renderPartners("Worldwide"); }
        }

        // UPDATED RENDER FUNCTION
        function renderPartners(country) {
            const grid = document.getElementById('partner-grid');
            const countLabel = document.getElementById('spots-count');
            const countBar = document.getElementById('spots-bar');
            
            // Find data or default
            const data = globalPartnerData[country] || globalPartnerData["Worldwide"];
            
            // Update UI Counter
            countLabel.innerText = `${data.spotsTaken} / 50`;
            countBar.style.width = `${(data.spotsTaken / 50) * 100}%`;

            if (data.partners.length === 0) {
                grid.innerHTML = `<div class="md:col-span-3 py-20 text-center glass-card rounded-[3rem] border-dashed border-white/20"><h3 class="text-2xl text-stone-300">Apply to be the first Partner in ${country}</h3></div>`;
            } else {
                grid.innerHTML = data.partners.map((p, index) => `
                    <div onclick="openPartner('${country}', ${index})" class="glass-card p-8 rounded-[2rem] cursor-pointer group">
                        <div class="aspect-video rounded-xl overflow-hidden mb-6 bg-stone-800">
                            <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        </div>
                        <h4 class="text-white text-xl font-bold mb-1">${p.name}</h4>
                        <p class="text-teal-400 text-[10px] uppercase tracking-widest font-bold">${p.city}</p>
                    </div>
                `).join('');
            }
        }

        // NEW MODAL FUNCTIONS
        function openPartner(country, index) {
            const p = (globalPartnerData[country] || globalPartnerData["Worldwide"]).partners[index];
            const modal = document.getElementById('partner-modal');
            const content = document.getElementById('modal-content');
            
            content.innerHTML = `
                <div class="grid md:grid-cols-2 gap-10">
                    <div class="rounded-2xl overflow-hidden bg-stone-900 aspect-[4/5]">
                        ${p.video ? 
                            `<iframe src="${p.video}" class="w-full h-full" frameborder="0" allowfullscreen></iframe>` : 
                            `<img src="${p.image}" class="w-full h-full object-cover">`
                        }
                    </div>
                    <div class="text-left flex flex-col justify-center">
                        <p class="text-teal-400 text-[10px] uppercase tracking-[0.3em] font-bold mb-4">${p.city}</p>
                        <h2 class="text-4xl text-white mb-6">${p.name}</h2>
                        <p class="text-stone-400 text-sm mb-8 leading-relaxed">${p.description}</p>
                        <div class="space-y-2 border-t border-white/10 pt-6">
                            <p class="text-[10px] text-stone-500 uppercase font-bold tracking-widest">Location</p>
                            <p class="text-white text-sm italic font-serif">${p.address}</p>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closePartner() {
            document.getElementById('partner-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function toggleLegal(id) {
            ['privacy-box', 'terms-box', 'cookies-box'].forEach(box => {
                if(box !== id + '-box') document.getElementById(box).classList.remove('open');
            });
            document.getElementById(id + '-box').classList.toggle('open');
        }

        function shareLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Invite link copied!");
        }

        changeLanguage('en');
        initLocation();
    </script>
